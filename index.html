    var k=KH[S.ki];h+='<div class="crd"><div class="crd-b"><div style="font-size:9px;color:#B8860B">'+k.t+'</div><div style="font-size:14px;font-weight:600;color:#8B0F0F;margin-top:2px">'+k.nm+'</div><div style="font-size:11px;color:#888;margin-top:5px;line-height:1.6">'+k.d+'</div></div></div>';
    h+='<div class="sec" style="margin-top:16px">TIMER FUD\u014cSHIN</div>';
    h+='<div style="text-align:center;padding:20px;background:#151518;border:1px solid #222;border-radius:12px"><div style="font-size:10px;color:#8B0F0F;letter-spacing:3px">M\u00c9DITATION 4-4-4</div><div id="tmr" style="font-size:48px;color:#e8e0d4;font-weight:300;margin:8px 0">05:00</div><div style="display:flex;gap:8px;justify-content:center"><button class="pill" onclick="tgl()">'+(!tOn?'\u25b6 Start':'\u23f8 Pause')+'</button><button class="pill" onclick="rst()">\u21ba Reset</button></div></div>';
  }

  if(S.tab==='armes'){
    h+='<div class="sec">BUKIJUTSU \u2014 \u6b66\u5668\u8853</div>';
    h+='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">';AR.forEach(function(a,i){h+='<button class="pill'+(S.ai===i?' on':'')+'" onclick="S.ai='+i+';render()">'+a.ic+' '+a.nm.replace('jutsu','')+'</button>';});h+='</div>';
    var a=AR[S.ai];h+='<div class="crd"><div class="crd-h">'+a.ic+' '+a.nm+'</div><div class="crd-b"><div style="font-size:11px;margin-bottom:8px"><b>Arme :</b> '+a.wp+'</div><div style="font-size:10px;color:#B8860B;letter-spacing:1px;margin-bottom:6px">KATA</div>';
    a.kt.forEach(function(k,i){h+='<div class="row"><div class="num">'+(i+1)+'</div><div>'+k+'</div></div>';});
    h+='<div style="font-size:10px;color:#B8860B;letter-spacing:1px;margin-top:10px;margin-bottom:6px">DRILL</div><div style="padding:8px;background:#0a0a0a;border-radius:6px;font-size:11px;line-height:1.5;border-left:2px solid #8B0F0F">'+a.dr+'</div></div></div>';
  }

  if(S.tab==='food'){
    h+='<div class="sec">NUTRITION \u2014 110KG REPRISE</div>';
    h+='<div class="crd"><div class="crd-b" style="text-align:center;font-weight:600;color:#B8860B;font-size:13px">'+NT.tot+'</div></div>';
    NT.rp.forEach(function(r){h+='<div class="crd"><div class="crd-b" style="display:flex;gap:8px;align-items:center"><span style="font-size:18px">'+r.ic+'</span><div><div style="font-size:12px;font-weight:600">'+r.m+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+r.mn+'</div></div></div></div>';});
  }

  if(S.tab==='spirit'){
    h+='<div class="sec">F\u00caTES DU SHINOBI</div>';
    FT.forEach(function(f){h+='<div class="crd"><div class="crd-b"><div style="display:flex;gap:8px;align-items:center"><span style="font-size:20px">'+f.ic+'</span><div><div style="font-size:12px;font-weight:600">'+f.nm+'</div><div style="font-size:10px;color:#B8860B">'+f.dt+'</div></div></div><div style="font-size:11px;color:#888;margin-top:6px;line-height:1.5">'+f.d+'</div></div></div>';});
    h+='<div class="sec" style="margin-top:14px">ENTIT\u00c9S & DIVINIT\u00c9S</div>';
    EN.forEach(function(e){h+='<div class="crd" style="border-left:3px solid '+e.co+'"><div class="crd-b"><div style="display:flex;gap:8px;align-items:center"><span style="font-size:20px">'+e.ic+'</span><div><div style="font-size:12px;font-weight:600;color:'+e.co+'">'+e.nm+'</div><div style="font-size:10px;color:#B8860B">'+e.rl+'</div></div></div><div style="font-size:11px;color:#888;margin-top:6px;line-height:1.5">'+e.d+'</div></div></div>';});
  }

  if(S.tab==='library'){
    if(S.chSel!==null){
      var ch=getCh(S.chSel);
      h+='<button class="pill" onclick="S.chSel=null;render()" style="margin-bottom:10px">\u2190 Retour</button>';
      if(ch){
        h+='<div class="sec">CHAPITRE '+ch.n+'</div>';
        h+='<div class="crd"><div class="crd-h" style="font-size:13px">'+esc(ch.t)+'</div>';
        h+='<div class="crd-b"><div style="font-size:11px;color:#bbb;line-height:1.8;white-space:pre-wrap">'+esc(ch.x)+'</div></div></div>';
      } else {
        h+='<div style="color:#666;font-size:12px;padding:20px">Chapitre non trouv\u00e9. Lance <code style="color:#B8860B">node build-chapters.js</code></div>';
      }
    } else if(S.livSel!==null){
      var lv=LV[S.livSel];
      h+='<button class="pill" onclick="S.livSel=null;render()" style="margin-bottom:10px">\u2190 Livres</button>';
      h+='<div class="sec">LIVRE '+lv.n+' \u2014 '+lv.t.toUpperCase()+'</div>';
      for(var i=0;i<lv.c;i++){var cn=lv.s+i;var ch=getCh(cn);
        h+='<div class="exp" onclick="S.chSel='+cn+';render()"><span style="color:#8B0F0F;font-weight:600;font-size:11px">Ch.'+cn+'</span>';
        if(ch)h+=' <span style="color:#666;font-size:10px">\u2014 '+esc(ch.t)+'</span>';
        h+='</div>';}
    } else {
      h+='<div class="sec">XIII LIVRES \u2022 123 CHAPITRES</div>';
      LV.forEach(function(l,idx){
        h+='<div class="exp" onclick="S.livSel='+idx+';render()"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">'+l.i+'</span><div style="flex:1"><div style="font-size:9px;color:#8B0F0F">LIVRE '+l.n+'</div><div style="font-size:12px;font-weight:600;margin-top:1px">'+l.t+'</div></div><span style="font-size:10px;color:#555">'+l.c+' ch.</span></div></div>';});
    }
  }

  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

var tSec=300,tOn=false,tInt=null;
function tgl(){tOn=!tOn;if(tOn){tInt=setInterval(function(){tSec--;if(tSec<=0){clearInterval(tInt);tOn=false;}var el=document.getElementById('tmr');if(el)el.textContent=String(Math.floor(tSec/60)).padStart(2,'0')+':'+String(tSec%60).padStart(2,'0');},1000);}else{clearInterval(tInt);}render();}
function rst(){clearInterval(tInt);tOn=false;tSec=300;render();}
function go(t){S.tab=t;S.wi=-1;S.livSel=null;S.chSel=null;render();window.scrollTo(0,0);}
function markDone(){if(S.done)return;var td=new Date().toISOString().slice(0,10);var d=JSON.parse(localStorage.getItem('ov7')||'{}');var y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=d.lastDate===y?(d.streak||0)+1:1;S.total=(d.total||0)+1;S.done=true;localStorage.setItem('ov7',JSON.stringify({streak:S.streak,total:S.total,phase:S.ph,lastDate:td}));render();}
render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
</script></body></html>
