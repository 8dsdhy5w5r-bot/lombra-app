function render(){
  var ph=PH[S.ph];var a=document.getElementById('app');
  var h='<div class="hdr"><div style="font-size:9px;letter-spacing:6px;color:#B8860B">L\'OMBRA</div><div style="font-size:17px;color:#fff;font-weight:300;margin-top:2px">Bible du Shinobi</div><div style="font-size:9px;color:#444;margin-top:3px">1m90 • 110kg • '+ph.ic+' Phase '+ph.nm+'</div></div>';
  h+='<div class="nav">';
  [['train','修練'],['phases','段'],['kata','型'],['armes','武'],['food','食'],['spirit','神'],['library','書']].forEach(function(t){
    h+='<button class="'+(S.tab===t[0]?'on':'')+'" onclick="go(\''+t[0]+'\')">'+t[1]+'</button>';
  });
  h+='</div><div class="cnt">';

  // ── TRAIN ──
  if(S.tab==='train'){
    var w=ph.sem;
    h+='<div class="sec">SEMAINE TYPE — PHASE '+ph.nm+' ('+ph.sub+')</div>';
    h+='<div style="font-size:11px;color:#666;margin-bottom:12px;line-height:1.5;font-style:italic">'+ph.d+'</div>';
    w.forEach(function(d,i){
      var open=S.wi===i;
      h+='<div class="exp" onclick="S.wi='+(open?-1:i)+';render()">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center">';
      h+='<div><span style="color:#B8860B;font-weight:600;font-size:12px">'+d.j+'</span> <span style="color:#666;font-size:11px">— '+d.t+'</span></div>';
      h+='<span style="color:#555;font-size:10px">'+d.du+' '+(open?'▲':'▼')+'</span></div>';
      if(open){
        h+='<div style="margin-top:8px;border-top:1px solid #222;padding-top:8px">';
        d.ex.forEach(function(e,j){h+='<div class="row"><div class="num">'+(j+1)+'</div><div style="flex:1">'+e+'</div></div>';});
        h+='</div>';
      }
      h+='</div>';
    });
    h+='<div style="margin-top:12px;padding:10px;background:#1a1510;border-radius:8px;font-size:11px;color:#B8860B;line-height:1.5">⚠️ <b>Reprise 110kg / 7 ans d\'arrêt</b> : Commence léger. Barre à vide les premières semaines. +2.5kg/sem. La mémoire musculaire de 15 ans de karaté fera le reste.</div>';
    h+='<button onclick="markDone()" style="width:100%;margin-top:12px;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;background:'+(S.done?'#4a7a5a':'linear-gradient(135deg,#8B0F0F,#6B0F0F)')+'">'+(S.done?'✅ Session complétée':'Marquer comme complété')+'</button>';
  }

  // ── PHASES ──
  if(S.tab==='phases'){
    h+='<div class="sec">PÉRIODISATION ANNUELLE — 4 PHASES</div>';
    PH.forEach(function(p,i){
      h+='<div class="crd" style="border-left:3px solid '+p.co+'" onclick="S.ph='+i+';S.wi=-1;S.tab=\'train\';render()">';
      h+='<div class="crd-b" style="cursor:pointer"><div style="display:flex;align-items:center;gap:10px">';
      h+='<span style="font-size:28px">'+p.ic+'</span><div style="flex:1">';
      h+='<div style="font-size:14px;font-weight:600;color:'+p.co+'">'+p.nm+'</div>';
      h+='<div style="font-size:11px;color:#888;margin-top:2px">'+p.sub+'</div>';
      h+='<div style="font-size:10px;color:#555;margin-top:4px;line-height:1.4">'+p.d+'</div>';
      h+='</div>'+(S.ph===i?'<span style="color:#B8860B">◀</span>':'')+'</div></div></div>';
    });
  }

    h+='<div class="sec">SAN SHIN NO KATA — 三心の型</div>';
    h+='<div style="display:flex;gap:4px;margin-bottom:10px">';
    SS.forEach(function(s,i){h+='<button class="pill'+(S.si===i?' on':'')+'" style="flex:1;'+(S.si===i?'background:'+s.co+';border-color:'+s.co:'color:'+s.co)+'" onclick="S.si='+i+';render()"><div style="font-size:18px">'+s.k+'</div><div style="font-size:7px;margin-top:1px">'+s.el+'</div></button>';});

    h+='<div class="crd" style="border-left:3px solid '+s.co+'"><div class="crd-b"><div style="font-size:14px;font-weight:600;color:'+s.co+'">'+s.nm+' no Kata</div><div style="font-size:11px;color:#888;margin-top:5px;line-height:1.6">'+s.d+'</div></div></div>';
    h+='<div class="sec" style="margin-top:16px">KIHON HAPPŌ — 基本八法</div>';
    h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">';
    KH.forEach(function(k,i){h+='<button class="pill'+(S.ki===i?' on':'')+'" onclick="S.ki='+i+';render()">'+(i+1)+'</button>';});
    h+='</div>';
    var k=KH[S.ki];
    h+='<div class="crd"><div class="crd-b"><div style="font-size:9px;color:#B8860B">'+k.t+'</div><div style="font-size:14px;font-weight:600;color:#8B0F0F;margin-top:2px">'+k.nm+'</div><div style="font-size:11px;color:#888;margin-top:5px;line-height:1.6">'+k.d+'</div></div></div>';

    h+='<div style="text-align:center;padding:20px;background:#151518;border:1px solid #222;border-radius:12px"><div style="font-size:10px;color:#8B0F0F;letter-spacing:3px">MÉDITATION 4-4-4</div><div id="timer" style="font-size:48px;color:#e8e0d4;font-weight:300;margin:8px 0">05:00</div><div style="display:flex;gap:8px;justify-content:center"><button class="pill" onclick="toggleTimer()">▶ Start</button><button class="pill" onclick="resetTimer()">↺ Reset</button></div></div>';
  }

    h+='</div>';
    var a=AR[S.ai];
    h+='<div class="crd"><div class="crd-h">'+a.ic+' '+a.nm+'</div><div class="crd-b">';
    h+='<div style="font-size:11px;margin-bottom:8px"><b>Arme :</b> '+a.wp+'</div>';
    h+='<div style="font-size:10px;color:#B8860B;letter-spacing:1px;margin-bottom:6px">KATA</div>';
    a.kt.forEach(function(k,i){h+='<div class="row"><div class="num">'+(i+1)+'</div><div>'+k+'</div></div>';});
    h+='<div style="font-size:10px;color:#B8860B;letter-spacing:1px;margin-top:10px;margin-bottom:6px">DRILL SESSION</div>';
    h+='<div style="padding:8px;background:#0a0a0a;border-radius:6px;font-size:11px;line-height:1.5;border-left:2px solid #8B0F0F">'+a.dr+'</div>';
    h+='</div></div>';
  }

  // ── NUTRITION ──
  if(S.tab==='food'){
    h+='<div class="sec">NUTRITION — 110KG REPRISE</div>';
    h+='<div class="crd"><div class="crd-b" style="text-align:center;font-weight:600;color:#B8860B;font-size:13px">'+NT.tot+'</div></div>';
    NT.rp.forEach(function(r){h+='<div class="crd"><div class="crd-b" style="display:flex;gap:8px;align-items:center"><span style="font-size:18px">'+r.ic+'</span><div><div style="font-size:12px;font-weight:600">'+r.m+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+r.mn+'</div></div></div></div>';});
  }

  // ── ESPRITS ──
  if(S.tab==='spirit'){
    h+='<div class="sec">FÊTES DU SHINOBI</div>';
    FT.forEach(function(f){h+='<div class="crd"><div class="crd-b"><div style="display:flex;gap:8px;align-items:center"><span style="font-size:20px">'+f.ic+'</span><div><div style="font-size:12px;font-weight:600">'+f.nm+'</div><div style="font-size:10px;color:#B8860B">'+f.dt+'</div></div></div><div style="font-size:11px;color:#888;margin-top:6px;line-height:1.5">'+f.d+'</div></div></div>';});
    h+='<div class="sec" style="margin-top:14px">ENTITÉS & DIVINITÉS</div>';
    EN.forEach(function(e){h+='<div class="crd" style="border-left:3px solid '+e.co+'"><div class="crd-b"><div style="display:flex;gap:8px;align-items:center"><span style="font-size:20px">'+e.ic+'</span><div><div style="font-size:12px;font-weight:600;color:'+e.co+'">'+e.nm+'</div><div style="font-size:10px;color:#B8860B">'+e.rl+'</div></div></div><div style="font-size:11px;color:#888;margin-top:6px;line-height:1.5">'+e.d+'</div></div></div>';});
  }

  // ── LIBRARY ──
  if(S.tab==='library'){
    if(!S.sub){
      h+='<div class="sec">XIII LIVRES • 123 CHAPITRES</div>';
      LV.forEach(function(l){h+='<div class="exp" onclick="S.sub='+l.n+';render()"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">'+l.i+'</span><div style="flex:1"><div style="font-size:9px;color:#8B0F0F">LIVRE '+l.n+'</div><div style="font-size:12px;font-weight:600;margin-top:1px">'+l.t+'</div></div><span style="font-size:10px;color:#555">'+l.c+' ch.</span></div></div>';});
    } else {
      var lv=LV.find(function(l){return l.n===S.sub;});
      h+='<button class="pill" onclick="S.sub=null;S.chap=null;render()" style="margin-bottom:10px">← Retour</button>';
      h+='<div class="sec">LIVRE '+lv.n+' — '+lv.t.toUpperCase()+'</div>';
      var st=lv.n===1?1:LV.slice(0,lv.n-1).reduce(function(a,b){return a+b.c;},0)+1;
      if(S.chap){
      var ch=(typeof CH!=='undefined')?CH.find(function(z){return z.n===S.chap;}):null;
      h+='<button class="pill" onclick="S.chap=null;render()" style="margin-bottom:10px">\u2190 Chapitre</button>';
      if(ch){
        h+='<div class="sec">CHAPITRE '+ch.n+'</div>';
        h+='<div class="crd"><div class="crd-h" style="font-size:13px">'+ch.t+'</div>';
        var safe=ch.x.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        h+='<div class="crd-b"><div style="font-size:11px;color:#bbb;line-height:1.8;white-space:pre-wrap">'+safe+'</div></div></div>';
      } else {
        h+='<div style="color:#666;font-size:12px;padding:20px">Chapitre non trouv\u00e9. Lance <code>node build-chapters.js</code> pour g\u00e9n\u00e9rer chapters.js</div>';
      }
    } else {
    for(var i=0;i<lv.c;i++){var cn=st+i;var cc=(typeof CH!=="undefined")?CH.find(function(z){return z.n===cn;}):null;h+='<div class="exp" onclick="S.chap='+cn+';render()"><span style="color:#8B0F0F;font-weight:600;font-size:11px">Ch.'+cn+'</span>';if(cc)h+=' <span style="color:#666;font-size:10px">— '+cc.t+'</span>';h+='</div>';}}
    }
  }

  h+='</div>';
  a.innerHTML=h;
}

// ── TIMER ──
var tSec=300,tOn=false,tInt=null;
function toggleTimer(){tOn=!tOn;if(tOn){tInt=setInterval(function(){tSec--;if(tSec<=0){clearInterval(tInt);tOn=false;}updTimer();},1000);}else{clearInterval(tInt);}}
function resetTimer(){clearInterval(tInt);tOn=false;tSec=300;updTimer();}
function updTimer(){var el=document.getElementById('timer');if(el)el.textContent=String(Math.floor(tSec/60)).padStart(2,'0')+':'+String(tSec%60).padStart(2,'0');}

function go(t){S.tab=t;S.sub=null;S.wi=-1;render();window.scrollTo(0,0);}
function markDone(){if(S.done)return;var td=new Date().toISOString().slice(0,10);var d=JSON.parse(localStorage.getItem('ov4')||'{}');var y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=d.lastDate===y?(d.streak||0)+1:1;S.total=(d.total||0)+1;S.done=true;localStorage.setItem('ov4',JSON.stringify({streak:S.streak,total:S.total,phase:S.ph,lastDate:td}));render();}

render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
</script></body></html>
